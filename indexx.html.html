<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVA Summer Camp 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes holoShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        @keyframes jumpUp {
            0% { 
                bottom: -200px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                bottom: calc(100vh + 200px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // ============================================
        // 🎯 YOUR SQUARE PAYMENT LINKS (UPDATED!)
        // ============================================
        const CONFIG = {
            squareMultiSportLink: "https://square.link/u/wWJLtU9n",
            squareVolleyballLink: "https://square.link/u/vaTTmfWE",
            
            multiSportPrice: 350,
            multiSportEarlyBird: 350,
            volleyballPrice: 275,
            volleyballEarlyBird: 275,
            earlyBirdDeadline: "June 1, 2026",
            
            location: "South Florida (Location TBD)",
            
            multiSportVideo: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            volleyballVideo: "https://www.youtube.com/embed/dQw4w9WgXcQ"
        };
        
        const SPARKY_IMAGE = "https://cdn.shopify.com/s/files/1/0826/1789/3104/files/sparky-transparent_1.png?v=1773160378";
        
        function DVACamp() {
            const [showIntro, setShowIntro] = useState(true);
            const [introStep, setIntroStep] = useState('waiting');
            const [sparky, setSparky] = useState(null);
            
            const audioContextRef = useRef(null);
            
            // Sparky vertical jump animation
            useEffect(() => {
                if (showIntro) return;
                
                const sparkySequence = () => {
                    // Vertical jump up the screen!
                    setSparky({ type: 'jump' });
                    
                    setTimeout(() => {
                        setSparky(null);
                        
                        // Show CTA after jump
                        setTimeout(() => {
                            setSparky({ type: 'cta' });
                            
                            setTimeout(() => {
                                setSparky(null);
                            }, 8000);
                        }, 1000);
                    }, 3000); // 3 second jump duration
                };
                
                const timer = setTimeout(() => {
                    sparkySequence();
                    const interval = setInterval(sparkySequence, 20000);
                    return () => clearInterval(interval);
                }, 5000);
                
                return () => clearTimeout(timer);
            }, [showIntro]);
            
            const startIntro = () => {
                setIntroStep('audio');
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                audioContextRef.current = audioCtx;
                
                playIntroSequence(audioCtx);
                
                setTimeout(() => {
                    setIntroStep('video');
                    playBassDrop(audioCtx);
                    
                    setTimeout(() => {
                        setShowIntro(false);
                        playBackgroundMusic(audioCtx);
                    }, 2000);
                }, 3000);
            };
            
            const playIntroSequence = (ctx) => {
                const beats = [
                    {time: 0, freq: 200, dur: 0.1},
                    {time: 0.15, freq: 300, dur: 0.1},
                    {time: 0.3, freq: 400, dur: 0.1},
                    {time: 0.5, freq: 500, dur: 0.2},
                    {time: 1, freq: 150, dur: 0.3},
                    {time: 1.5, freq: 250, dur: 0.3},
                    {time: 2, freq: 180, dur: 0.5}
                ];
                
                beats.forEach(beat => {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = beat.freq;
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + beat.dur);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + beat.dur);
                    }, beat.time * 1000);
                });
            };
            
            const playBassDrop = (ctx) => {
                [200, 150, 100, 80].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    const delay = i * 0.05;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
                    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + delay + 0.8);
                    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
                    gain.gain.linearRampToValueAtTime(0.8, ctx.currentTime + delay + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 2);
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 2);
                });
            };
            
            const playBackgroundMusic = (ctx) => {
                const playBeat = () => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 80;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                };
                
                setInterval(playBeat, 600);
            };
            
            const skipIntro = () => {
                setShowIntro(false);
                if (audioContextRef.current) {
                    playBackgroundMusic(audioContextRef.current);
                }
            };
            
            if (showIntro) {
                return <IntroSequence step={introStep} onStart={startIntro} onSkip={skipIntro} />;
            }
            
            return (
                <div className="font-['Outfit'] bg-black text-white min-h-screen">
                    {sparky && <SparkyMascot sparky={sparky} config={CONFIG} />}
                    
                    <nav className="sticky top-0 z-50 bg-black border-b-4 border-[#ff2070] px-4 lg:px-12 h-16 flex items-center justify-between">
                        <div className="font-['Bebas_Neue'] text-xl lg:text-2xl tracking-[0.3em] text-white">
                            DVA <span className="text-[#00e8eb]">CAMP</span>
                        </div>
                        
                        <div className="hidden lg:flex gap-6 text-sm font-semibold">
                            <a href="#camps" className="text-gray-300 hover:text-[#00e8eb] transition">Camps</a>
                            <a href="#features" className="text-gray-300 hover:text-[#00e8eb] transition">Features</a>
                            <a href="#videos" className="text-gray-300 hover:text-[#00e8eb] transition">Videos</a>
                            <a href="#pricing" className="text-gray-300 hover:text-[#00e8eb] transition">Pricing</a>
                            <a href="#faq" className="text-gray-300 hover:text-[#00e8eb] transition">FAQ</a>
                        </div>
                        
                        <a href="#camps" className="bg-[#ff2070] text-white font-bold text-sm px-6 py-2.5 rounded hover:bg-[#ff5090] transition uppercase tracking-wider">
                            Register Now
                        </a>
                    </nav>
                    
                    <section id="hero" className="py-20 lg:py-32 px-4 lg:px-12 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-[radial-gradient(ellipse,rgba(255,32,112,0.15)_0%,transparent_70%)] pointer-events-none" />
                        
                        <div className="relative max-w-5xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#00e8eb] mb-4">
                                Diamond Volleyball Academy
                            </div>
                            
                            <h1 className="font-['Bebas_Neue'] text-6xl lg:text-9xl tracking-wider mb-6 font-black relative inline-block">
                                <span className="absolute inset-0 blur-2xl opacity-60" style={{
                                    background: 'linear-gradient(90deg, #ff2070, #ff6b9d, #c471ed, #00e8eb, #ff2070)',
                                    backgroundSize: '200% 100%',
                                    animation: 'holoShift 3s linear infinite',
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent',
                                    backgroundClip: 'text'
                                }}>
                                    SUMMER 2026
                                </span>
                                <span style={{
                                    background: 'linear-gradient(90deg, #ff2070, #ff6b9d, #c471ed, #00e8eb, #ff2070)',
                                    backgroundSize: '200% 100%',
                                    animation: 'holoShift 3s linear infinite',
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent',
                                    backgroundClip: 'text',
                                    filter: 'drop-shadow(0 0 20px rgba(255, 32, 112, 0.8))'
                                }}>
                                    SUMMER 2026
                                </span>
                            </h1>
                            
                            <p className="text-xl lg:text-2xl text-gray-300 mb-10 max-w-2xl mx-auto">
                                Two amazing camps. One incredible summer. <br/>
                                <span className="text-[#00e8eb] font-bold">Early bird pricing ends June 1st!</span>
                            </p>
                            
                            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                                <a href="#camps" className="bg-[#ff2070] text-white font-bold text-lg px-12 py-5 rounded-lg hover:bg-[#ff5090] transition uppercase tracking-wider inline-block">
                                    Explore Camps →
                                </a>
                                <a href="#pricing" className="border-2 border-[#00e8eb] text-[#00e8eb] font-bold text-lg px-12 py-5 rounded-lg hover:bg-[#00e8eb] hover:text-black transition uppercase tracking-wider inline-block">
                                    View Pricing
                                </a>
                            </div>
                        </div>
                    </section>
                    
                    <section id="camps" className="py-20 lg:py-28 px-4 lg:px-12 border-t-4 border-[#ff2070]">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#00e8eb] mb-3">
                                Choose Your Adventure
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-5xl lg:text-8xl tracking-wider mb-4 font-black">
                                TWO CAMPS. ONE SUMMER.
                            </h2>
                            <p className="text-base text-gray-400 max-w-2xl leading-relaxed mb-14">
                                Pick the experience that fits your style. Mix sports and gaming, or go all-in on volleyball. Both led by pros.
                            </p>
                            
                            <div className="grid lg:grid-cols-2 gap-8">
                                <CampCard 
                                    name="MULTISPORT & GAMING"
                                    tagline="You're in control - with the controller and on the court!"
                                    schedule="Mon-Fri, 9am-3pm"
                                    ages="7-18 years old"
                                    price={CONFIG.multiSportEarlyBird}
                                    link={CONFIG.squareMultiSportLink}
                                    color="#ff2070"
                                    features={[
                                        "🎮 Gaming Center Sessions",
                                        "🏐 Volleyball & Basketball",
                                        "🎬 Movie Days",
                                        "🎲 Board Game Tournaments",
                                        "👥 Social & Team Building",
                                        "🏆 Pro & College Coaches"
                                    ]}
                                />
                                
                                <CampCard 
                                    name="VOLLEYBALL ELITE"
                                    tagline="Bump, Spike, and get Set for your new favorite Summer Camp"
                                    schedule="4 Days/Week, 10am-2pm"
                                    ages="7-18 years old"
                                    price={CONFIG.volleyballEarlyBird}
                                    link={CONFIG.squareVolleyballLink}
                                    color="#00e8eb"
                                    features={[
                                        "🏐 4 Hours Daily Training",
                                        "📈 Skill Progression Tracking",
                                        "🎯 Position-Specific Drills",
                                        "💪 Strength & Conditioning",
                                        "🏆 Pro & College Coaches",
                                        "🍕 Lunch Included"
                                    ]}
                                />
                            </div>
                        </div>
                    </section>
                    
                    <section id="features" className="py-20 lg:py-28 px-4 lg:px-12 bg-[#0a0a0a] border-t-4 border-[#00e8eb]">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#ff2070] mb-3">
                                What's Included
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-5xl lg:text-8xl tracking-wider mb-14 font-black">
                                BUILT FOR CHAMPIONS.
                            </h2>
                            
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <FeatureCard icon="👥" title="Small Group Coaching" description="Max 30 campers per session with 1 coach per 10 kids. Individual attention guaranteed." color="#ff2070" />
                                <FeatureCard icon="⭐" title="Pro & College Staff" description="Learn from professional athletes and current collegiate players who compete at the highest levels." color="#00e8eb" />
                                <FeatureCard icon="⚡" title="Age-Appropriate Training" description="Programs designed specifically for 7-18 year olds with skill-based grouping." color="#ff2070" />
                                <FeatureCard icon="🎮" title="Gaming Culture" description="Dedicated gaming center sessions, board games, and e-sports friendly environment." color="#00e8eb" />
                                <FeatureCard icon="🏆" title="Competition Ready" description="Skills training focused on club tryouts and competitive play for fall season." color="#ff2070" />
                                <FeatureCard icon="✨" title="Fun & Social Focus" description="Movies, themed days, team building activities, and lifelong friendships." color="#00e8eb" />
                            </div>
                        </div>
                    </section>
                    
                    <section id="videos" className="py-20 lg:py-28 px-4 lg:px-12 border-t-4 border-[#ff2070]">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#00e8eb] mb-3">
                                See It In Action
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-5xl lg:text-8xl tracking-wider mb-4 font-black">
                                MEET YOUR COACHES.
                            </h2>
                            <p className="text-base text-gray-400 max-w-2xl leading-relaxed mb-14">
                                Watch intro videos from our coaching staff and get a preview of what camp looks like.
                            </p>
                            
                            <div className="grid md:grid-cols-2 gap-8">
                                <VideoCard title="Multi-Sport & Gaming Camp Preview" description="See what a week of gaming, sports, and fun looks like" videoUrl={CONFIG.multiSportVideo} />
                                <VideoCard title="Volleyball Elite Training Highlights" description="Watch our pro coaches in action during skills sessions" videoUrl={CONFIG.volleyballVideo} />
                            </div>
                        </div>
                    </section>
                    
                    <section id="pricing" className="py-20 lg:py-28 px-4 lg:px-12 bg-[#0a0a0a] border-t-4 border-[#00e8eb]">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#ff2070] mb-3">
                                Simple Pricing
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-5xl lg:text-8xl tracking-wider mb-14 font-black">
                                LOCK IN YOUR SPOT.
                            </h2>
                            
                            <div className="grid md:grid-cols-2 gap-8 mb-8">
                                <PricingCard name="Multi-Sport & Gaming" price={CONFIG.multiSportEarlyBird} color="#ff2070" link={CONFIG.squareMultiSportLink} />
                                <PricingCard name="Volleyball Elite" price={CONFIG.volleyballEarlyBird} color="#00e8eb" link={CONFIG.squareVolleyballLink} />
                            </div>
                            
                            <div className="bg-[#161616] border border-gray-800 border-l-4 border-l-[#00e8eb] rounded-lg p-6 text-center">
                                <p className="text-sm text-gray-300 leading-relaxed">
                                    <strong className="text-white">Early Bird Special:</strong> Save $25 when you register before {CONFIG.earlyBirdDeadline}!
                                </p>
                            </div>
                        </div>
                    </section>
                    
                    <section id="faq" className="py-20 lg:py-28 px-4 lg:px-12 border-t-4 border-[#ff2070]">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#00e8eb] mb-3">
                                Got Questions?
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-5xl lg:text-8xl tracking-wider mb-14 font-black">
                                WE GOT ANSWERS.
                            </h2>
                            
                            <FAQItem question="What's the difference between the two camps?" answer="Multi-Sport & Gaming is a mix of volleyball, basketball, gaming center sessions, movies, and board games - perfect for kids who want variety and social fun. Volleyball Elite is 4 hours of focused volleyball training daily for kids serious about skill development." />
                            <FAQItem question="My child has never played volleyball - can they still attend?" answer="Absolutely! The Multi-Sport & Gaming camp welcomes all skill levels and includes volleyball as one of many activities. For the Volleyball Elite camp, we recommend at least one season of experience, but beginners with strong interest are welcome." />
                            <FAQItem question="What's included in the camp fee?" answer="All coaching, equipment, facility use, and daily programming. For Multi-Sport camp: gaming center access, movies, activities. For Volleyball Elite: lunch is included. Both camps have pro/college coaches and small group ratios." />
                            <FAQItem question="When are the exact camp dates and location?" answer="Dates and location are being finalized. Early registrants get first notification and first choice of weeks. Sign up now to be notified as soon as dates are confirmed!" />
                        </div>
                    </section>
                    
                    <section className="py-24 px-4 lg:px-12 text-center bg-black relative overflow-hidden border-t-4 border-[#00e8eb]">
                        <div className="absolute top-[-60px] left-1/2 -translate-x-1/2 w-[700px] h-[300px] bg-[radial-gradient(ellipse,rgba(255,32,112,0.18)_0%,transparent_70%)] pointer-events-none" />
                        
                        <div className="relative max-w-3xl mx-auto">
                            <div className="text-xs font-black tracking-[0.3em] uppercase text-[#ff2070] mb-4">
                                Limited Spots · First Come First Served
                            </div>
                            <h2 className="font-['Bebas_Neue'] text-6xl lg:text-9xl tracking-wider mb-6 font-black">
                                SUMMER STARTS HERE.
                            </h2>
                            <p className="text-lg text-gray-300 mb-10 max-w-xl mx-auto">
                                Spots fill fast. Lock in early bird pricing before {CONFIG.earlyBirdDeadline}.
                            </p>
                            
                            <a href="#camps" className="bg-[#ff2070] text-white font-bold text-lg px-12 py-5 rounded-lg hover:bg-[#ff5090] transition uppercase tracking-wider inline-block">
                                Choose Your Camp →
                            </a>
                        </div>
                    </section>
                    
                    <footer className="py-8 px-4 lg:px-12 bg-black border-t border-gray-800 flex flex-col lg:flex-row items-center justify-between gap-4 text-sm">
                        <div className="font-['Bebas_Neue'] text-xl tracking-[0.25em] text-white">
                            DVA <span className="text-[#00e8eb]">CAMP</span>
                        </div>
                        <div className="flex gap-6">
                            <a href="#camps" className="text-gray-500 hover:text-white transition">Camps</a>
                            <a href="#pricing" className="text-gray-500 hover:text-white transition">Pricing</a>
                            <a href="#videos" className="text-gray-500 hover:text-white transition">Videos</a>
                            <a href="#faq" className="text-gray-500 hover:text-white transition">FAQ</a>
                        </div>
                        <div className="text-gray-700">© 2026 Diamond Volleyball Academy</div>
                    </footer>
                </div>
            );
        }
        
        function IntroSequence({ step, onStart, onSkip }) {
            return (
                <div className="fixed inset-0 z-[200] bg-black flex items-center justify-center">
                    <button onClick={onSkip} className="absolute top-8 right-8 text-gray-400 hover:text-white transition text-sm font-semibold">
                        Skip Intro ✕
                    </button>
                    
                    {step === 'waiting' && (
                        <div className="text-center">
                            <div className="font-['Bebas_Neue'] text-7xl lg:text-9xl tracking-wider text-white mb-8 animate-pulse">
                                DVA <span className="text-[#ff2070]">CAMP</span>
                            </div>
                            <div className="text-2xl text-gray-300 mb-12">Summer 2026</div>
                            <button onClick={onStart} className="bg-gradient-to-r from-[#ff2070] to-[#ff5090] text-white font-black text-2xl px-16 py-6 rounded-lg hover:scale-105 transition uppercase animate-pulse">
                                🔊 Start Experience 🔊
                            </button>
                        </div>
                    )}
                    
                    {step === 'audio' && (
                        <div className="text-center">
                            <div className="font-['Bebas_Neue'] text-5xl lg:text-7xl tracking-wider text-white mb-6 animate-pulse">
                                🎧 DJ SPARKY 🎧
                            </div>
                            <div className="flex justify-center gap-2 mt-8">
                                {[...Array(9)].map((_, i) => (
                                    <div key={i} className="w-3 animate-pulse bg-gradient-to-t" style={{ 
                                        height: `${[20, 32, 48, 40, 56, 44, 36, 28, 24][i]}px`,
                                        background: i % 2 === 0 ? '#ff2070' : '#00e8eb',
                                        animationDelay: `${i * 100}ms`
                                    }} />
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {step === 'video' && (
                        <div className="text-center">
                            <div className="font-['Bebas_Neue'] text-9xl tracking-wider text-[#ff2070] mb-4 animate-pulse">
                                BASS DROP
                            </div>
                            <div className="text-2xl text-gray-400 animate-bounce">🎵 Let's Go! 🎵</div>
                        </div>
                    )}
                </div>
            );
        }
        
        function SparkyMascot({ sparky, config }) {
            return (
                <div className="fixed z-[110] pointer-events-none">
                    {sparky.type === 'jump' && (
                        <div style={{
                            position: 'fixed',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            animation: 'jumpUp 3s ease-out forwards'
                        }}>
                            <div className="relative">
                                {/* Trail effects */}
                                <div className="absolute left-1/2 -translate-x-1/2 bottom-0 w-48 h-96 bg-gradient-to-t from-[#00e8eb]/30 via-[#ff2070]/20 to-transparent blur-2xl" />
                                <div className="absolute left-1/2 -translate-x-1/2 bottom-0 w-32 h-64 bg-gradient-to-t from-[#ff2070]/40 via-[#00e8eb]/30 to-transparent blur-xl animate-pulse" />
                                
                                {/* Sparky jumping! */}
                                <img 
                                    src={SPARKY_IMAGE}
                                    alt="Sparky"
                                    style={{ 
                                        width: '180px',
                                        filter: 'drop-shadow(0 0 30px #00e8eb) drop-shadow(0 0 20px #ff2070)',
                                        position: 'relative',
                                        zIndex: 10
                                    }}
                                />
                            </div>
                        </div>
                    )}
                    
                    {sparky.type === 'cta' && (
                        <div style={{ position: 'fixed', bottom: '20px', right: '20px', pointerEvents: 'auto' }}>
                            <div className="bg-gradient-to-br from-[#ff2070] to-[#ff5090] rounded-2xl p-1 shadow-2xl" style={{animation: 'sparkle 2s ease-in-out infinite'}}>
                                <div className="bg-black rounded-xl p-6 max-w-xs">
                                    <div className="flex items-start gap-4 mb-4">
                                        <img src={SPARKY_IMAGE} alt="Sparky" style={{ width: '70px' }} />
                                        <div>
                                            <div className="font-['Bebas_Neue'] text-xl text-white mb-1">
                                                DON'T MISS OUT!
                                            </div>
                                            <div className="text-sm text-gray-300">
                                                Early bird spots are filling fast! Register now and save $25.
                                            </div>
                                        </div>
                                    </div>
                                    <a href="#camps" className="block text-center bg-[#ff2070] text-white font-bold text-sm py-3 rounded-lg hover:bg-[#ff5090] transition uppercase">
                                        Register Now →
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        function CampCard({ name, tagline, schedule, ages, price, link, color, features }) {
            return (
                <div className="bg-[#1a1a1a] border-2 border-gray-800 rounded-xl overflow-hidden hover:border-gray-700 hover:scale-[1.02] transition-all duration-300">
                    <div className="p-8" style={{borderTop: `4px solid ${color}`}}>
                        <div className="font-['Bebas_Neue'] text-4xl tracking-wider mb-2 text-white">{name}</div>
                        <div className="text-sm font-semibold mb-4" style={{ color }}>"{tagline}"</div>
                        
                        <div className="space-y-3 mb-6 pb-6 border-b border-gray-800">
                            <div className="flex items-center gap-2 text-sm text-gray-300"><span>📅</span> {schedule}</div>
                            <div className="flex items-center gap-2 text-sm text-gray-300"><span>👤</span> {ages}</div>
                            <div className="flex items-center gap-2 text-sm font-bold" style={{color}}><span>💰</span> ${price}/week</div>
                        </div>
                        
                        <div className="space-y-2 mb-6">
                            {features.map((f, i) => <div key={i} className="text-sm text-gray-400">{f}</div>)}
                        </div>
                        
                        <a href={link} target="_blank" rel="noopener noreferrer" className="block text-center py-3 px-6 rounded font-bold text-sm uppercase tracking-wider transition-all hover:scale-105" style={{background: color, color: '#fff'}}>
                            Register Now →
                        </a>
                    </div>
                </div>
            );
        }
        
        function FeatureCard({ icon, title, description, color }) {
            return (
                <div className="bg-[#1a1a1a] border border-gray-800 rounded-lg p-6 hover:border-gray-700 hover:scale-105 transition-all duration-300 border-t-4" style={{borderTopColor: color}}>
                    <div className="text-4xl mb-4">{icon}</div>
                    <h3 className="text-lg font-bold text-white mb-2">{title}</h3>
                    <p className="text-sm text-gray-400 leading-relaxed">{description}</p>
                </div>
            );
        }
        
        function VideoCard({ title, description, videoUrl }) {
            const [playing, setPlaying] = useState(false);
            return (
                <div className="bg-[#1a1a1a] border border-gray-800 rounded-lg overflow-hidden hover:border-gray-700 transition">
                    <div className="relative aspect-video bg-black flex items-center justify-center cursor-pointer" onClick={() => setPlaying(true)}>
                        {!playing ? (
                            <>
                                <div className="absolute inset-0 bg-gradient-to-br from-[#ff2070]/20 to-[#00e8eb]/20" />
                                <div className="relative z-10 w-16 h-16 rounded-full bg-[#ff2070] flex items-center justify-center hover:scale-110 transition">
                                    <div className="text-white text-3xl ml-1">▶</div>
                                </div>
                            </>
                        ) : (
                            <iframe src={videoUrl} className="absolute inset-0 w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen />
                        )}
                    </div>
                    <div className="p-6">
                        <h3 className="text-lg font-bold text-white mb-2">{title}</h3>
                        <p className="text-sm text-gray-400">{description}</p>
                    </div>
                </div>
            );
        }
        
        function PricingCard({ name, price, color, link }) {
            return (
                <div className="bg-[#1a1a1a] border-2 rounded-lg p-8 text-center" style={{borderColor: color}}>
                    <div className="text-xs font-bold tracking-[0.2em] uppercase text-gray-500 mb-3">{name}</div>
                    <div className="mb-6">
                        <div className="flex items-baseline justify-center gap-2 mb-2">
                            <span className="font-['Bebas_Neue'] text-7xl tracking-wider" style={{color}}>${price}</span>
                            <span className="text-lg text-gray-500">/week</span>
                        </div>
                        <div className="text-sm font-bold mt-2" style={{color}}>Early Bird Special!</div>
                    </div>
                    <a href={link} target="_blank" rel="noopener noreferrer" className="block py-3 px-6 rounded font-bold text-sm uppercase tracking-wider hover:opacity-90 transition" style={{background: color, color: '#fff'}}>
                        Register Now
                    </a>
                </div>
            );
        }
        
        function FAQItem({ question, answer }) {
            const [open, setOpen] = useState(false);
            return (
                <div className="border border-gray-800 rounded-lg overflow-hidden bg-[#1a1a1a] mb-3">
                    <button onClick={() => setOpen(!open)} className="w-full px-6 py-5 text-left flex items-center justify-between hover:bg-[#222222] transition">
                        <span className="text-base font-semibold text-white pr-4">{question}</span>
                        <span className="text-2xl" style={{color: open ? '#00e8eb' : '#ff2070'}}>{open ? '−' : '+'}</span>
                    </button>
                    {open && <div className="px-6 pb-5 text-sm text-gray-300 leading-relaxed">{answer}</div>}
                </div>
            );
        }
        
        ReactDOM.render(<DVACamp />, document.getElementById('root'));
    </script>
</body>
</html>
